<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><title>上传发票 - 发票核对</title>
<style>
body{font-family:"Microsoft YaHei",Arial,sans-serif;margin:0;background:#f5f5f5;}
header{background:#4CAF50;color:#fff;padding:16px;text-align:center;font-size:20px;}
.nav{background:#fff;padding:10px 20px;border-bottom:1px solid #ddd;font-size:14px;}
.nav a{color:#2e7d32;text-decoration:none;margin-right:16px;}
main{padding:24px;max-width:720px;margin:0 auto;}
.panel{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
h2{margin-top:0;color:#333;}
input[type=file]{padding:8px;font-size:14px;width:100%;box-sizing:border-box;}
button{padding:10px 24px;background:#4CAF50;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:15px;margin-top:16px;}
.error{color:#d32f2f;margin-top:12px;font-size:14px;background:#ffebee;padding:10px;border-radius:4px;}
.tip{color:#666;font-size:13px;margin-top:8px;}
</style></head>
<body>
<header>上传发票</header>
<div class="nav">
<a href="/">← 首页</a>
<a href="{{ url_for('invoicing.index') }}">← 发票核对</a>
<a href="{{ url_for('invoicing.invoices_list') }}">发票列表</a>
</div>
<main>
<div class="panel">
<h2>选择 PDF 发票上传</h2>
<form method="post" action="{{ url_for('invoicing.invoices_upload_submit') }}" enctype="multipart/form-data">
  <input type="file" name="pdf_file" accept="application/pdf" required>
  <button type="submit">上传并解析</button>
</form>
<p class="tip">单张上传，上传后进入复核页人工确认字段、客户、主体后才入库。</p>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
</main></body></html>
