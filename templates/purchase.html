<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>采购入库</title>
<style>
body { font-family: "Microsoft YaHei", Arial, sans-serif; margin:30px; line-height:1.6; }
h1 { font-size:24px; margin-bottom:20px; text-align:center; }
textarea { width:100%; font-family: monospace; margin-bottom:10px; }
button { padding:10px 20px; font-size:16px; cursor:pointer; }
.table-container { overflow:auto; max-height:400px; margin-top:20px; }

label { display: block; margin-bottom: 8px; }

#parsed_data {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 20px;
}

#parsed_data input,
#parsed_data select,
#parsed_data textarea {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

.full-width {
    grid-column: 1 / -1;
}

.readonly-note {
    background-color: #f7f7f7;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background-color: #45a049;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table th, table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

table th {
    background-color: #f2f2f2;
}
</style>
</head>
<body>

<h1>采购入库</h1>

<textarea id="input_data" rows="10" placeholder="粘贴多行采购记录，每行如：2026/01/21 13:50	5025318013309559238	10号(175x95x115mm)300个;三层空白【超硬】SS	包材	528.00"></textarea>
<button id="parse_btn">解析</button>

<div id="parsed_data">
    <div>
        <label for="purchase_date">采购日期:</label>
        <input type="text" id="purchase_date" >
    </div>

    <div>
        <label for="order_id">订单号:</label>
        <input type="text" id="order_id" >
    </div>

    <div>
        <label for="pack_item_name">包材型号:</label>
        <input type="text" id="pack_item_name" >
    </div>

    <div>
        <label for="per_bag_quantity">每袋件数:</label>
        <input type="text" id="per_bag_quantity" >
    </div>

    <div>
        <label for="bag_count">袋数:</label>
        <input type="number" id="bag_count" min="0" step="1" placeholder="手工输入袋数">
    </div>

    <div>
        <label for="total_quantity">总件数:</label>
        <input type="text" id="total_quantity" >
    </div>

    <div>
        <label for="total_amount">总价:</label>
        <input type="text" id="total_amount" >
    </div>

    <div>
        <label for="unit_price">每件单价:</label>
        <input type="text" id="unit_price" >
    </div>

    <div>
        <label for="supplier_name">供应商:</label>
        <input type="text" id="supplier_name" list="supplier_list" placeholder="可输入或选择供应商">
        <datalist id="supplier_list">
            <option value="福山"></option>
            <option value="止盈"></option>
        </datalist>
    </div>

    <div>
        <label for="prev_price_change">较前次价格变化:</label>
        <input type="text" id="prev_price_change" disabled>
    </div>

    <div>
        <label for="next_price_change">较后次价格变化:</label>
        <input type="text" id="next_price_change" disabled>
    </div>

    <div class="full-width">
        <label for="notes">备注 / 原始描述:</label>
        <textarea id="notes" rows="3" class="readonly-note" ></textarea>
    </div>
</div>

<div class="table-container">
<h2>最近采购记录</h2>
<table>
<thead>
<tr>
<th>采购ID</th>
<th>订单号</th>
<th>采购日期</th>
<th>包材名称</th>
<th>袋数</th>
<th>总件数</th>
<th>总金额</th>
<th>备注</th>
</tr>
</thead>
<tbody>
{% for row in rows %}
<tr>
<td>{{ row['purchase_id'] }}</td>
<td>{{ row['order_id'] }}</td>
<td>{{ row['purchase_date'] }}</td>
<td>{{ row['pack_item_name'] }}</td>
<td>{{ row['bag_count'] }}</td>
<td>{{ row['total_qty'] }}</td>
<td>{{ row['total_amount'] }}</td>
<td>{{ row['notes'] }}</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<script>
    function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
    }

    function recalcTotals() {
        const perBagQuantity = toNumber(document.getElementById('per_bag_quantity').value);
        const bagCount = toNumber(document.getElementById('bag_count').value);
        const totalAmount = toNumber(document.getElementById('total_amount').value);

        const totalQuantity = perBagQuantity * bagCount;
        document.getElementById('total_quantity').value = totalQuantity ? String(totalQuantity) : '';

        if (totalQuantity > 0 && totalAmount > 0) {
            document.getElementById('unit_price').value = (totalAmount / totalQuantity).toFixed(4);
        } else {
            document.getElementById('unit_price').value = '';
        }
    }

    function parsePurchaseData() {
        var inputData = document.getElementById('input_data').value;

        if (!inputData.trim()) {
            alert("请输入采购记录！");
            return;
        }

        fetch('/purchase/parse_purchase_data', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ data: inputData })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('网络响应失败');
            }
            return response.json();
        })
        .then(data => {
            if (!data || data.success === false) {
                console.error("后端返回数据格式错误：", data);
                alert(data && data.message ? data.message : '解析失败');
                return;
            }

            document.getElementById('input_data').value = data.remaining_text || '';
            document.getElementById('purchase_date').value = data.purchase_date || '';
            document.getElementById('order_id').value = data.order_no || '';
            document.getElementById('pack_item_name').value = data.pack_item_name || '';
            document.getElementById('per_bag_quantity').value = data.piece_qty || '';
            document.getElementById('total_amount').value = data.total_price || '';
            document.getElementById('notes').value = data.remark || '';
            document.getElementById('prev_price_change').value = '';
            document.getElementById('next_price_change').value = '';
            recalcTotals();
        })
        .catch(error => {
            console.error('请求失败:', error);
            alert('请求失败，请重试');
        });
    }

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('parse_btn').addEventListener('click', parsePurchaseData);
    document.getElementById('bag_count').addEventListener('input', recalcTotals);
    document.getElementById('per_bag_quantity').addEventListener('input', recalcTotals);
    document.getElementById('total_amount').addEventListener('input', recalcTotals);

    document.getElementById('total_quantity').addEventListener('input', function() {
        const totalQuantity = toNumber(document.getElementById('total_quantity').value);
        const totalAmount = toNumber(document.getElementById('total_amount').value);

        if (totalQuantity > 0 && totalAmount > 0) {
            document.getElementById('unit_price').value = (totalAmount / totalQuantity).toFixed(4);
        } else {
            document.getElementById('unit_price').value = '';
        }
    });
});
</script>

</body>
</html>
